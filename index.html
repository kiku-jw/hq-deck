<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#080a0a" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="A swipe-first prototype for turning AI suggestions into bounded plans and approval-gated execution." />
    <meta name="application-name" content="HQ Deck" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HQ Deck" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:title" content="HQ Deck" />
    <meta property="og:description" content="Swipe through AI-proposed work, shape a bounded plan, and grant execution authority separately." />
    <meta property="og:url" content="https://kiku-jw.github.io/hq-deck/" />
    <meta property="og:image" content="https://kiku-jw.github.io/hq-deck/preview.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://kiku-jw.github.io/hq-deck/" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>HQ Deck — интерактивный прототип</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="HQ Deck">
      <header class="topbar">
        <button class="brand" type="button" data-action="home" aria-label="В начало">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>HQ</span>
        </button>

        <div class="path-progress" id="path-progress" aria-label="Прогресс выбора"></div>

        <button class="icon-button" id="history-action" type="button" data-action="reset" aria-label="Сбросить прототип" title="Сбросить прототип">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h10a6 6 0 1 1-5.6 8.2M4 7l3-3M4 7l3 3" />
          </svg>
        </button>
      </header>

      <section class="stage" id="stage" aria-live="polite"></section>

    </main>

    <div class="sheet-backdrop" id="sheet-backdrop" hidden></div>
    <section class="bottom-sheet" id="nuance-sheet" role="dialog" aria-modal="true" aria-labelledby="nuance-title" hidden>
      <div class="sheet-handle" aria-hidden="true"></div>
      <p class="eyebrow">Не третий ответ</p>
      <h2 id="nuance-title">Добавь нюанс</h2>
      <p>ИИ учтёт комментарий, но текущий вопрос всё равно останется бинарным.</p>
      <label class="sr-only" for="nuance-input">Комментарий</label>
      <textarea id="nuance-input" rows="4" placeholder="Например: да, но только без публикации…"></textarea>
      <div class="sheet-actions">
        <button class="button secondary" type="button" data-action="close-nuance">Закрыть</button>
        <button class="button primary" type="button" data-action="save-nuance">Сохранить</button>
      </div>
    </section>

    <template id="decision-template">
      <article class="decision-card" id="decision-card" tabindex="0" aria-describedby="gesture-help">
        <div class="project-art" id="project-art" aria-hidden="true"></div>
        <div class="decision-vignette" aria-hidden="true"></div>
        <div class="swipe-feedback swipe-feedback--no" aria-hidden="true">НЕТ</div>
        <div class="swipe-feedback swipe-feedback--yes" aria-hidden="true">ДА</div>

        <div class="decision-content">
          <p class="eyebrow" id="card-eyebrow"></p>
          <h1 id="card-question"></h1>
          <p class="card-support" id="card-support"></p>
        </div>
      </article>

      <div class="decision-controls" id="gesture-help">
        <button class="choice-button" type="button" data-answer="no">
          <span aria-hidden="true">←</span>
          <span>Нет</span>
        </button>
        <button class="nuance-button" type="button" data-action="open-nuance" aria-label="Добавить нюанс">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z" />
            <path d="M5.5 11.5V12a6.5 6.5 0 0 0 13 0v-.5M12 18.5V22M9 22h6" />
          </svg>
        </button>
        <button class="choice-button" type="button" data-answer="yes">
          <span>Да</span>
          <span aria-hidden="true">→</span>
        </button>
      </div>
      <p class="gesture-caption">Свайпни или используй стрелки клавиатуры</p>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
